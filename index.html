<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>90.3 WJCE - Listen Live</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="player-container">
        <h1 id="station-title">All Your Favorite Country Songs, Commercial Free! On 90.3 WJCE</h1>
        <p id="status">Status: Paused</p>

        <audio id="radio-audio" preload="none">
            <source src="https://your-stream-url-here.mp3" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>

        <div class="controls">
            <button id="play-btn">▶ Play</button>
            
            <div class="volume-container">
                <label for="volume-slider">🔊</label>
                <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="0.8">
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
