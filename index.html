<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>90.3 WJCE - Listen Live</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="player-container">
        <h1 id="station-title">All Your Favorite Country Songs, Commercial Free! On 90.3 WJCE</h1>
        <p id="status">Status: Paused</p>

        <div class="now-playing-container">
            <div class="album-art-wrapper">
                <img id="album-art" src="https://placehold.co/300x300/1e1e2f/ffffff?text=Radio" alt="Album Art">
            </div>
            <span class="meta-label">NOW PLAYING:</span>
            <div id="track-title">Loading track info...</div>
            <div id="artist-name"></div>
        </div>

        <audio id="radio-audio" preload="none">
            <source src="https://ice25.securenetsystems.net/WJVL" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>

        <div class="controls">
            <button id="play-btn">▶ Play</button>
            <div class="volume-container">
                <label for="volume-slider">🔊</label>
                <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="0.8">
            </div>
        </div>

        <div class="history-container">
            <h3>Recently Played</h3>
            <ul id="history-list">
                <li class="empty-history">No history available yet</li>
            </ul>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
