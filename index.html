<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>90.3 WJCE - Live Stream</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="hero-section">
        <div class="hero-left">
            <img src="https://mmo.aiircdn.com/1835/6912199e02f44.png" alt="Callsign Logo" class="station-logo">
            <div class="hero-controls">
                <button id="hero-play-btn" class="circle-play-btn">▶</button>
                <div class="hero-status-text">
                    <span class="sub-label">On Air Now:</span>
                    <span class="station-name">All Your Favorite Country Music, 90.3 WJCE</span>
                </div>
            </div>
        </div>
        
        <div class="hero-right">
            <div class="now-playing-card">
                <img id="album-art" src="https://placehold.co/400x400/999/fff?text=90.3 WJCE" alt="Current Album Art">
                <div class="card-overlay">
                    <div id="track-title" class="overlay-title">All Your Favorite Country Music</div>
                    <div id="artist-name" class="overlay-artist">90.3 WJCE</div>
                </div>
            </div>
        </div>
    </header>

    <main class="history-section">
        <div class="history-header">
            <h2>Previously Played</h2>
            <button id="view-all-btn">View Full History</button>
        </div>
        
        <div id="history-grid" class="history-grid"></div>
    </main>

    <footer class="sticky-player-bar">
        <div class="mini-player-info">
            <button id="bar-play-btn" class="mini-play-btn">▶</button>
            <img id="bar-album-art" src="https://placehold.co/50x50/999/fff?text=90.3 WJCE" alt="Mini Art" class="mini-art">
            <div class="mini-text">
                <div id="bar-track-title" class="mini-title">All Your Favorite Country Music</div>
                <div id="bar-artist-name" class="mini-artist">90.3 WJCE</div>
            </div>
        </div>
        
        <div class="mini-player-controls">
            <span class="volume-icon">🔊</span>
            <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="0.8">
        </div>
    </footer>

    <div id="history-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Complete Song History</h3>
                <button id="close-modal-btn" class="close-btn">&times;</button>
            </div>
            <ul id="full-history-list">
                </ul>
        </div>
    </div>

    <audio id="radio-audio" preload="none">
        <source src="https://stream-01.aiir.com/xvs92xikunwtv?zt=eyJhbGciOiJIUzI1NiJ9.eyJzdHJlYW0iOiJ4dnM5Mnhpa3Vud3R2IiwiaG9zdCI6InN0cmVhbS0wMS5haWlyLmNvbSIsInJ0dGwiOjUsImp0aSI6Ik9RZ2J3Tnd3VDY2aWJUQzdOS213RWciLCJpYXQiOjE3Nzk0MTQ2ODgsImV4cCI6MTc3OTQxNDc0OH0.ftBeXAOj5ffhSHuEOVdHRI_FYYJZ2AI8DpfUpI_RLh8" type="audio/mpeg">
    </audio>

    <script src="app.js"></script>
</body>
</html>
